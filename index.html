<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reds Sim</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 700px;
      margin: 40px auto;
      padding: 0 20px;
      line-height: 1.5;
    }

    input, button {
      font-size: 16px;
      padding: 8px;
      margin-top: 6px;
    }

    .row {
      margin-bottom: 16px;
    }

    #output {
      margin-top: 24px;
      font-size: 18px;
      font-weight: bold;
    }

    #batch-output {
      margin-top: 24px;
      white-space: pre-wrap;
      font-family: monospace;
      background: #f5f5f5;
      padding: 12px;
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <h1>Reds Sim</h1>

  <div class="row">
    <label for="trials">Trials:</label><br />
    <input id="trials" type="number" value="10000" min="1" />
  </div>

  <div class="row">
    <label for="hp">HP % (decimal from 0 to 1):</label><br />
    <input id="hp" type="number" step="0.01" value="0.20" min="0" max="1" />
  </div>

  <div class="row">
    <button id="run-single">Run Single HP</button>
    <button id="run-batch">Run 17%–25%</button>
  </div>

  <div id="output"></div>
  <div id="batch-output"></div>

  <script type="module" src="./js/ui.js"></script>
</body>
</html>
